services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: acuity
      POSTGRES_PASSWORD: acuity
      POSTGRES_DB: acuity_lms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acuity -d acuity_lms"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
